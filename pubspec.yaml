name: wedding_cards
description: "Wedding Website Builder - Create beautiful wedding websites in Malayalam and English"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management & DI
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Data Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.2.4

  # Google Maps
  google_maps_flutter: ^2.10.0

  # Image Handling
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  cached_network_image: ^3.4.1

  # QR Code
  pretty_qr_code: ^3.3.0

  # PDF Generation
  pdf: ^3.11.2
  printing: ^5.13.5

  # Typography
  google_fonts: ^6.2.1

  # Sharing
  share_plus: ^10.1.4
  url_launcher: ^6.3.1

  # Utilities
  intl: ^0.20.2
  path_provider: ^2.1.5

  # UI Enhancements
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

  # WebView for preview
  webview_flutter: ^4.10.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/translations/
